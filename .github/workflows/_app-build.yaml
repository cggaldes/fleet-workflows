name: App Build (reusable)

on:
  workflow_call:
    inputs:
      image-name:
        description: Container image name (e.g. payments-api). Defaults to the calling repo name.
        required: false
        type: string
        default: ${{ github.event.repository.name }}
      go-version:
        description: Go version to use for building
        required: false
        type: string
        default: "1.23"
      run-tests:
        description: Whether to run go test before building the image
        required: false
        type: boolean
        default: true

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build and push ${{ inputs.image-name }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        if: ${{ inputs.run-tests }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ inputs.go-version }}

      - name: Run tests
        if: ${{ inputs.run-tests }}
        run: go test ./...

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.ref == 'refs/heads/main' }}
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ inputs.image-name }}:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/${{ inputs.image-name }}:latest

      - name: Make package public
        if: ${{ github.ref == 'refs/heads/main' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for i in $(seq 1 10); do
            VISIBILITY=$(gh api /user/packages/container/${{ inputs.image-name }} \
              --jq '.visibility' 2>/dev/null || echo "not-found")

            if [ "$VISIBILITY" = "public" ]; then
              echo "Package is already public, nothing to do."
              exit 0
            elif [ "$VISIBILITY" = "private" ]; then
              echo "Package is private, setting to public..."
              gh api --method PATCH \
                /user/packages/container/${{ inputs.image-name }} \
                -f visibility=public && exit 0
            fi

            echo "Attempt $i: package not yet visible in API (push propagation lag), retrying in 20s..."
            sleep 20
          done
          echo "Package did not appear in API after 10 attempts, giving up."
          exit 1
