name: App Release (reusable)

on:
  workflow_call:
    inputs:
      image-name:
        description: Container image name. Defaults to the calling repo name.
        required: false
        type: string
        default: ${{ github.event.repository.name }}

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Release ${{ inputs.image-name }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build and push release image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ inputs.image-name }}:${{ github.ref_name }}
            ghcr.io/${{ github.repository_owner }}/${{ inputs.image-name }}:${{ steps.version.outputs.version }}

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
